name: Scheduled share local working tree to branch

on:
  schedule:
    # Run daily at 22:00 Pakistan Standard Time (PKT = UTC+5) => 17:00 UTC
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Define this in repo/org Variables as JSON, e.g. ["fizza-awais","alice","bob"]
  USERS_JSON: ${{ vars.RUNNER_USERS_JSON }}

jobs:
  share:
    name: Share local work (${{ matrix.user }})
    strategy:
      fail-fast: false
      matrix:
        # Use the repository/org variable RUNNER_USERS_JSON which must be JSON array of usernames.
        # Can't rely on env.* here because matrix is evaluated before job env is applied.
        user: ${{ fromJSON(vars.RUNNER_USERS_JSON) }}

    # Concurrency per user so their independent matrix jobs don't cancel each other.
    # (matrix context is available at job level, not at workflow root.)
    concurrency:
      group: scheduled-share-local-${{ github.repository }}-${{ matrix.user }}
      cancel-in-progress: false

    # Request ALL labels that your runner has so only that runner matches
    runs-on:
      - self-hosted
      - Linux
      - docker
      - user-${{ matrix.user }}

    env:
      COMMIT_MESSAGE: "chore: share local work → branch"
      REPO_BASE: "/home/runner/_repos"
      WORKING_DIR: "/workspace"
      GIT_AUTHOR_NAME: "GitHub Actions (Self-Hosted)"
      GIT_AUTHOR_EMAIL: "actions@github.com"
      GIT_COMMITTER_NAME: "GitHub Actions (Self-Hosted)"
      GIT_COMMITTER_EMAIL: "actions@github.com"

    steps:
      - name: Resolve repo path (prefer mounted working copy)
        id: ensure
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%/*}"
          name="${GITHUB_REPOSITORY#*/}"
          url="https://github.com/${GITHUB_REPOSITORY}.git"
          if [[ -n "$WORKING_DIR" && -d "$WORKING_DIR/.git" ]]; then
            path="$WORKING_DIR"
            echo "Using mounted working copy: $path"
            actual="$(git -C "$path" remote get-url origin 2>/dev/null || true)"
            if [[ -n "$actual" && "$actual" != "$url" ]]; then
              echo "::error::Mounted repo remote ($actual) does not match calling repo ($url)."
              exit 1
            fi
            if ! git -C "$path" remote | grep -qx origin; then
              git -C "$path" remote add origin "$url"
            else
              git -C "$path" remote set-url origin "$url"
            fi
            git -C "$path" fetch origin --prune || true
          else
            base="${REPO_BASE}/${owner}"
            mkdir -p "$base"
            path="${base}/${name}"
            echo "Mounted working copy not found; using persistent clone: $path"
            if [[ ! -d "$path/.git" ]]; then
              git clone "$url" "$path"
            else
              git -C "$path" remote set-url origin "$url"
              git -C "$path" fetch origin --prune
            fi
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "url=$url"   >> "$GITHUB_OUTPUT"

      - name: Configure auth (PUSH_PAT or GITHUB_TOKEN)
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          AUTH_TOKEN="${{ secrets.PUSH_PAT }}"
          if [[ -z "$AUTH_TOKEN" ]]; then AUTH_TOKEN="${{ github.token }}"; fi
          enc="$(printf "x-access-token:%s" "$AUTH_TOKEN" | base64 -w 0 2>/dev/null || base64 -i -)"
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $enc"

      - name: Configure Git identity (respect existing, fallback to bot)
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          name="$(git config --get user.name  || echo "github-actions[bot]")"
          email="$(git config --get user.email || echo "41898282+github-actions[bot]@users.noreply.github.com")"
          git config user.name  "$name"
          git config user.email "$email"
          echo "Using git identity: $name <$email>"

      - name: Commit local changes (if any)
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "${COMMIT_MESSAGE}"
            echo "did_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "No local changes to commit."
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute normalized login for var key (uses matrix.user)
        id: who
        shell: bash
        env:
          TARGET_USER: ${{ matrix.user }}
        run: |
          set -euo pipefail
          login_lc="${TARGET_USER,,}"
          norm="${login_lc//-/_}"
          echo "norm=$norm" >> "$GITHUB_OUTPUT"
          echo "var_key=${norm}_branch" >> "$GITHUB_OUTPUT"
          echo "Expecting repo variable: ${norm}_branch"

      - name: Determine branch (per-user repo var > current local branch)
        id: target
        shell: bash
        env:
          FROM_VARS: ${{ vars[steps.who.outputs.var_key] }}
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          if [[ -n "$FROM_VARS" ]]; then
            target="$FROM_VARS"
          else
            current="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo HEAD)"
            if [[ "$current" != "HEAD" && -n "$current" ]]; then
              target="$current"
            else
              echo "::error::No per-user variable set for ${{ matrix.user }} (expected: ${{ steps.who.outputs.var_key }}) and not on a branch."
              exit 1
            fi
          fi
          echo "Using branch: $target"
          echo "target_branch=$target" >> "$GITHUB_OUTPUT"

      - name: Push HEAD to target branch
        shell: bash
        env:
          TARGET: ${{ steps.target.outputs.target_branch }}
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          git fetch origin --prune || true
          if git ls-remote --exit-code origin "refs/heads/$TARGET" >/dev/null 2>&1; then
            git push origin HEAD:"refs/heads/$TARGET"
          else
            git push -u origin HEAD:"refs/heads/$TARGET"
          fi

      - name: Final status
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          echo "✅ Final Status"
          echo "Path: $(pwd)"
          echo "Repo root: $(git rev-parse --show-toplevel)"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Remote: $(git remote get-url origin)"
          git log -1 --oneline || true
          git status --short || true

      - name: Safety scrub (ensure no leftover headers in mounted repo)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.ensure.outputs.path }}"
          git config --unset-all http.https://github.com/.extraheader || true
